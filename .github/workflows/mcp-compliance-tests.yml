name: MCP Compliance Tests

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'mcp/ast-grep-mcp-server/**'
      - 'mcp/fdep-mcp-server/**'
      - 'mcp/mcp-compliance/**'
      - '.github/workflows/mcp-compliance-tests.yml'
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'mcp/ast-grep-mcp-server/**'
      - 'mcp/fdep-mcp-server/**'
      - 'mcp/mcp-compliance/**'
      - '.github/workflows/mcp-compliance-tests.yml'

jobs:
  ast-grep-tests:
    name: ast-grep-mcp-server Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'mcp/ast-grep-mcp-server/package-lock.json'
      
      - name: Install dependencies
        working-directory: mcp/ast-grep-mcp-server
        run: npm ci
      
      - name: Build
        working-directory: mcp/ast-grep-mcp-server
        run: npm run build
      
      - name: Run tests
        working-directory: mcp/ast-grep-mcp-server
        run: npm run test
        continue-on-error: false

  fdep-tests:
    name: fdep-mcp-server Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: mcp/fdep-mcp-server
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      
      - name: Run tests
        working-directory: mcp/fdep-mcp-server
        run: pytest -q
        continue-on-error: false

  compliance-summary:
    name: Compliance Check Summary
    runs-on: ubuntu-latest
    needs: [ast-grep-tests, fdep-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.ast-grep-tests.result }}" != "success" ] || [ "${{ needs.fdep-tests.result }}" != "success" ]; then
            echo "❌ MCP Compliance Tests Failed"
            exit 1
          fi
          echo "✅ All MCP Compliance Tests Passed"
